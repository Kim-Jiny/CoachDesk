<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CoachDesk 운영자 콘솔</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; }
    [x-cloak] { display: none !important; }
    .panel-enter { transition: transform .25s ease-out; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
<div x-data="adminApp()" x-init="init()" x-cloak>

  <!-- 로그인 -->
  <template x-if="!token">
    <div class="min-h-screen flex items-center justify-center px-6">
      <div class="w-full max-w-sm bg-white rounded-2xl shadow-lg p-8">
        <h1 class="text-xl font-bold text-center mb-1">CoachDesk 운영자 콘솔</h1>
        <p class="text-sm text-slate-500 text-center mb-6">관리자 계정으로 로그인하세요</p>
        <form @submit.prevent="login" class="space-y-3">
          <div>
            <label class="text-xs text-slate-500">아이디</label>
            <input x-model="form.username" autocomplete="username" required
                   class="mt-1 w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-400" />
          </div>
          <div>
            <label class="text-xs text-slate-500">비밀번호</label>
            <input x-model="form.password" type="password" autocomplete="current-password" required
                   class="mt-1 w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-400" />
          </div>
          <p x-show="loginError" x-text="loginError" class="text-sm text-rose-500"></p>
          <button type="submit" :disabled="loading"
                  class="w-full py-2.5 rounded-lg bg-indigo-600 text-white font-semibold hover:bg-indigo-700 disabled:opacity-60">
            <span x-show="!loading">로그인</span>
            <span x-show="loading">처리 중...</span>
          </button>
        </form>
      </div>
    </div>
  </template>

  <!-- 메인 -->
  <template x-if="token">
    <div class="min-h-screen flex">
      <!-- Sidebar -->
      <aside class="w-56 bg-slate-900 text-slate-100 flex flex-col">
        <div class="px-6 py-5 border-b border-slate-800">
          <p class="text-xs text-slate-400">CoachDesk</p>
          <p class="text-base font-bold">운영자 콘솔</p>
        </div>
        <nav class="flex-1 px-3 py-4 space-y-1">
          <template x-for="item in nav" :key="item.id">
            <button @click="page = item.id"
                    :class="page === item.id ? 'bg-indigo-600 text-white' : 'text-slate-300 hover:bg-slate-800'"
                    class="w-full text-left px-3 py-2 rounded-lg text-sm flex items-center gap-2">
              <span x-text="item.label"></span>
            </button>
          </template>
        </nav>
        <div class="px-4 py-4 border-t border-slate-800 text-xs text-slate-400 space-y-2">
          <div>로그인: <span class="text-slate-200" x-text="me?.username"></span></div>
          <button @click="page = 'password'" class="text-indigo-300 hover:text-indigo-200">비밀번호 변경</button>
          <button @click="logout" class="block text-rose-300 hover:text-rose-200">로그아웃</button>
        </div>
      </aside>

      <!-- Content -->
      <main class="flex-1 px-8 py-6 overflow-x-auto">

        <!-- Dashboard -->
        <section x-show="page === 'dashboard'">
          <h2 class="text-xl font-bold mb-4">대시보드</h2>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <template x-for="card in dashboardCards" :key="card.label">
              <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <p class="text-xs text-slate-500" x-text="card.label"></p>
                <p class="text-2xl font-bold mt-1" x-text="card.value"></p>
                <p x-show="card.sub" class="text-xs text-slate-400 mt-1" x-text="card.sub"></p>
              </div>
            </template>
          </div>

          <div class="mt-6 grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
              <h3 class="font-semibold mb-3">최근 7일 가입</h3>
              <canvas id="signupsChart" height="120"></canvas>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
              <h3 class="font-semibold mb-3">최근 7일 예약</h3>
              <canvas id="reservationsChart" height="120"></canvas>
            </div>
          </div>

          <div class="mt-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
              <h3 class="font-semibold mb-3">최근 가입 사용자</h3>
              <ul class="space-y-2 text-sm">
                <template x-for="u in latestUsers" :key="u.id">
                  <li class="flex justify-between items-center cursor-pointer hover:bg-slate-50 -mx-2 px-2 py-1 rounded" @click="openUser(u.id)">
                    <span>
                      <span class="font-medium" x-text="u.name"></span>
                      <span class="text-slate-400 text-xs ml-2" x-text="u.email"></span>
                    </span>
                    <span class="text-xs text-slate-400" x-text="formatDate(u.createdAt)"></span>
                  </li>
                </template>
                <li x-show="!latestUsers.length" class="text-slate-400">없음</li>
              </ul>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
              <h3 class="font-semibold mb-3">최근 가입 회원</h3>
              <ul class="space-y-2 text-sm">
                <template x-for="m in latestMembers" :key="m.id">
                  <li class="flex justify-between items-center cursor-pointer hover:bg-slate-50 -mx-2 px-2 py-1 rounded" @click="openMember(m.id)">
                    <span>
                      <span class="font-medium" x-text="m.name"></span>
                      <span class="text-slate-400 text-xs ml-2" x-text="m.email"></span>
                    </span>
                    <span class="text-xs text-slate-400" x-text="formatDate(m.createdAt)"></span>
                  </li>
                </template>
                <li x-show="!latestMembers.length" class="text-slate-400">없음</li>
              </ul>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
              <h3 class="font-semibold mb-3">최근 조직</h3>
              <ul class="space-y-2 text-sm">
                <template x-for="o in latestOrgs" :key="o.id">
                  <li class="flex justify-between items-center cursor-pointer hover:bg-slate-50 -mx-2 px-2 py-1 rounded" @click="openOrg(o.id)">
                    <span>
                      <span class="font-medium" x-text="o.name"></span>
                      <span class="text-slate-400 text-xs ml-2" x-text="`관리자 ${o.adminCount} · 회원 ${o.memberCount}`"></span>
                    </span>
                    <span class="text-xs text-slate-400" x-text="formatDate(o.createdAt)"></span>
                  </li>
                </template>
                <li x-show="!latestOrgs.length" class="text-slate-400">없음</li>
              </ul>
            </div>
          </div>
        </section>

        <!-- Users -->
        <section x-show="page === 'users'">
          <h2 class="text-xl font-bold mb-4">사용자 (관리자)</h2>
          <div class="mb-4 flex gap-2">
            <input x-model="usersSearch" @input.debounce.300ms="loadUsers()" placeholder="이름/이메일 검색"
                   class="px-3 py-2 border border-slate-200 rounded-lg text-sm w-72" />
            <button @click="loadUsers()" class="px-3 py-2 text-sm bg-slate-100 rounded-lg hover:bg-slate-200">새로고침</button>
          </div>
          <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-sm">
              <thead class="bg-slate-50 text-slate-500 text-xs uppercase">
                <tr>
                  <th class="text-left px-4 py-2">이름</th>
                  <th class="text-left px-4 py-2">이메일</th>
                  <th class="text-left px-4 py-2">소속 조직</th>
                  <th class="text-left px-4 py-2">생성일</th>
                  <th class="text-left px-4 py-2">슈퍼관리자</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="u in users" :key="u.id">
                  <tr class="border-t border-slate-100 cursor-pointer hover:bg-slate-50" @click="openUser(u.id)">
                    <td class="px-4 py-2 font-medium" x-text="u.name"></td>
                    <td class="px-4 py-2 text-slate-600" x-text="u.email"></td>
                    <td class="px-4 py-2 text-slate-500" x-text="(u.memberships || []).map((m) => m.organization.name).join(', ') || '-'"></td>
                    <td class="px-4 py-2 text-slate-500" x-text="formatDate(u.createdAt)"></td>
                    <td class="px-4 py-2">
                      <span x-show="u.isSuperAdmin" class="px-2 py-0.5 text-xs bg-indigo-100 text-indigo-700 rounded-full">SUPER</span>
                    </td>
                  </tr>
                </template>
                <tr x-show="!users.length"><td colspan="5" class="px-4 py-6 text-center text-slate-400">데이터가 없습니다</td></tr>
              </tbody>
            </table>
          </div>
        </section>

        <!-- Member Accounts -->
        <section x-show="page === 'members'">
          <h2 class="text-xl font-bold mb-4">회원 계정</h2>
          <div class="mb-4 flex gap-2">
            <input x-model="membersSearch" @input.debounce.300ms="loadMembers()" placeholder="이름/이메일 검색"
                   class="px-3 py-2 border border-slate-200 rounded-lg text-sm w-72" />
            <button @click="loadMembers()" class="px-3 py-2 text-sm bg-slate-100 rounded-lg hover:bg-slate-200">새로고침</button>
          </div>
          <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-sm">
              <thead class="bg-slate-50 text-slate-500 text-xs uppercase">
                <tr>
                  <th class="text-left px-4 py-2">이름</th>
                  <th class="text-left px-4 py-2">이메일</th>
                  <th class="text-left px-4 py-2">스튜디오</th>
                  <th class="text-left px-4 py-2">생성일</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="m in memberAccounts" :key="m.id">
                  <tr class="border-t border-slate-100 cursor-pointer hover:bg-slate-50" @click="openMember(m.id)">
                    <td class="px-4 py-2 font-medium" x-text="m.name"></td>
                    <td class="px-4 py-2 text-slate-600" x-text="m.email"></td>
                    <td class="px-4 py-2 text-slate-500" x-text="(m.members || []).map((x) => x.organization.name).join(', ') || '-'"></td>
                    <td class="px-4 py-2 text-slate-500" x-text="formatDate(m.createdAt)"></td>
                  </tr>
                </template>
                <tr x-show="!memberAccounts.length"><td colspan="4" class="px-4 py-6 text-center text-slate-400">데이터가 없습니다</td></tr>
              </tbody>
            </table>
          </div>
        </section>

        <!-- Organizations -->
        <section x-show="page === 'orgs'">
          <h2 class="text-xl font-bold mb-4">조직</h2>
          <div class="mb-4 flex gap-2">
            <input x-model="orgsSearch" @input.debounce.300ms="loadOrgs()" placeholder="이름 검색"
                   class="px-3 py-2 border border-slate-200 rounded-lg text-sm w-72" />
            <button @click="loadOrgs()" class="px-3 py-2 text-sm bg-slate-100 rounded-lg hover:bg-slate-200">새로고침</button>
          </div>
          <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-sm">
              <thead class="bg-slate-50 text-slate-500 text-xs uppercase">
                <tr>
                  <th class="text-left px-4 py-2">이름</th>
                  <th class="text-left px-4 py-2">초대코드</th>
                  <th class="text-left px-4 py-2">플랜</th>
                  <th class="text-left px-4 py-2">관리자</th>
                  <th class="text-left px-4 py-2">회원</th>
                  <th class="text-left px-4 py-2">생성일</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="o in organizations" :key="o.id">
                  <tr class="border-t border-slate-100 cursor-pointer hover:bg-slate-50" @click="openOrg(o.id)">
                    <td class="px-4 py-2 font-medium" x-text="o.name"></td>
                    <td class="px-4 py-2 font-mono text-xs text-slate-500" x-text="o.inviteCode"></td>
                    <td class="px-4 py-2"><span class="px-2 py-0.5 text-xs bg-slate-100 rounded" x-text="o.planType"></span></td>
                    <td class="px-4 py-2 text-slate-600" x-text="`${o.counts?.admins ?? '-'} / ${o.maxAdminCount}`"></td>
                    <td class="px-4 py-2 text-slate-600" x-text="`${o.counts?.members ?? '-'} / ${o.maxMemberCount}`"></td>
                    <td class="px-4 py-2 text-slate-500" x-text="formatDate(o.createdAt)"></td>
                  </tr>
                </template>
                <tr x-show="!organizations.length"><td colspan="6" class="px-4 py-6 text-center text-slate-400">데이터가 없습니다</td></tr>
              </tbody>
            </table>
          </div>
        </section>

        <!-- Password Change -->
        <section x-show="page === 'password'">
          <h2 class="text-xl font-bold mb-4">비밀번호 변경</h2>
          <form @submit.prevent="changePassword" class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 max-w-md space-y-3">
            <div>
              <label class="text-xs text-slate-500">현재 비밀번호</label>
              <input x-model="pw.current" type="password" required class="mt-1 w-full px-3 py-2 border border-slate-200 rounded-lg" />
            </div>
            <div>
              <label class="text-xs text-slate-500">새 비밀번호 (4자 이상)</label>
              <input x-model="pw.next" type="password" minlength="4" required class="mt-1 w-full px-3 py-2 border border-slate-200 rounded-lg" />
            </div>
            <p x-show="pw.message" x-text="pw.message" :class="pw.success ? 'text-emerald-600' : 'text-rose-500'" class="text-sm"></p>
            <button type="submit" class="px-4 py-2 rounded-lg bg-indigo-600 text-white font-semibold hover:bg-indigo-700">변경</button>
          </form>
        </section>

      </main>

      <!-- Detail Side Panel -->
      <div x-show="detail.open"
           class="fixed inset-0 z-40 flex"
           x-transition.opacity>
        <div class="flex-1 bg-slate-900/40" @click="closeDetail()"></div>
        <aside class="w-[480px] max-w-full bg-white border-l border-slate-200 overflow-y-auto"
               x-transition:enter="panel-enter"
               x-transition:enter-start="translate-x-full"
               x-transition:enter-end="translate-x-0">
          <div class="px-6 py-4 border-b border-slate-200 flex items-center justify-between bg-white sticky top-0">
            <p class="font-bold text-base" x-text="detail.title || '상세'"></p>
            <button @click="closeDetail()" class="text-slate-500 hover:text-slate-800">✕</button>
          </div>
          <div class="px-6 py-4">
            <p x-show="detail.loading" class="text-sm text-slate-500">불러오는 중...</p>

            <!-- User Detail -->
            <template x-if="!detail.loading && detail.kind === 'user' && detail.data">
              <div class="space-y-4">
                <div>
                  <p class="text-lg font-bold" x-text="detail.data.name"></p>
                  <p class="text-sm text-slate-500" x-text="detail.data.email"></p>
                  <p x-show="detail.data.isSuperAdmin" class="mt-1 inline-block px-2 py-0.5 text-xs bg-indigo-100 text-indigo-700 rounded-full">SUPER ADMIN</p>
                </div>
                <dl class="grid grid-cols-2 gap-3 text-sm">
                  <div><dt class="text-slate-400 text-xs">전화</dt><dd x-text="detail.data.phone || '-'"></dd></div>
                  <div><dt class="text-slate-400 text-xs">예약 정책</dt><dd x-text="detail.data.reservationPolicy"></dd></div>
                  <div><dt class="text-slate-400 text-xs">예약 모드</dt><dd x-text="detail.data.bookingMode"></dd></div>
                  <div><dt class="text-slate-400 text-xs">가입일</dt><dd x-text="formatDateTime(detail.data.createdAt)"></dd></div>
                </dl>
                <div>
                  <p class="text-xs text-slate-400 mb-2">소속 조직</p>
                  <ul class="space-y-1 text-sm">
                    <template x-for="m in detail.data.memberships" :key="m.id">
                      <li class="flex justify-between items-center px-3 py-2 bg-slate-50 rounded cursor-pointer hover:bg-slate-100" @click="openOrg(m.organization.id)">
                        <span><span class="font-medium" x-text="m.organization.name"></span><span class="ml-2 text-xs text-slate-400" x-text="m.role"></span></span>
                        <span class="text-xs text-slate-400" x-text="formatDate(m.createdAt)"></span>
                      </li>
                    </template>
                    <li x-show="!(detail.data.memberships || []).length" class="text-slate-400 text-sm">소속 조직 없음</li>
                  </ul>
                </div>
                <div class="pt-4 border-t">
                  <button @click="deleteUserConfirm(detail.data.id)" class="text-sm text-rose-500 hover:text-rose-700">사용자 삭제</button>
                </div>
              </div>
            </template>

            <!-- Member Detail -->
            <template x-if="!detail.loading && detail.kind === 'member' && detail.data">
              <div class="space-y-4">
                <div>
                  <p class="text-lg font-bold" x-text="detail.data.name"></p>
                  <p class="text-sm text-slate-500" x-text="detail.data.email"></p>
                </div>
                <dl class="grid grid-cols-2 gap-3 text-sm">
                  <div><dt class="text-slate-400 text-xs">가입일</dt><dd x-text="formatDateTime(detail.data.createdAt)"></dd></div>
                </dl>
                <div>
                  <p class="text-xs text-slate-400 mb-2">참여 스튜디오</p>
                  <ul class="space-y-1 text-sm">
                    <template x-for="m in detail.data.members" :key="m.id">
                      <li class="flex justify-between items-center px-3 py-2 bg-slate-50 rounded cursor-pointer hover:bg-slate-100" @click="openOrg(m.organization.id)">
                        <span class="font-medium" x-text="m.organization.name"></span>
                        <span class="text-xs text-slate-400" x-text="m.name"></span>
                      </li>
                    </template>
                    <li x-show="!(detail.data.members || []).length" class="text-slate-400 text-sm">참여 스튜디오 없음</li>
                  </ul>
                </div>
              </div>
            </template>

            <!-- Org Detail -->
            <template x-if="!detail.loading && detail.kind === 'org' && detail.data">
              <div class="space-y-4">
                <div>
                  <p class="text-lg font-bold" x-text="detail.data.name"></p>
                  <p class="text-sm text-slate-500" x-text="detail.data.description || '설명 없음'"></p>
                  <p class="mt-1"><span class="px-2 py-0.5 text-xs bg-slate-100 rounded" x-text="detail.data.planType"></span></p>
                </div>
                <dl class="grid grid-cols-2 gap-3 text-sm">
                  <div><dt class="text-slate-400 text-xs">초대코드</dt><dd class="font-mono text-xs" x-text="detail.data.inviteCode"></dd></div>
                  <div><dt class="text-slate-400 text-xs">생성일</dt><dd x-text="formatDateTime(detail.data.createdAt)"></dd></div>
                  <div><dt class="text-slate-400 text-xs">관리자</dt><dd x-text="`${detail.data.counts?.admins ?? 0} / ${detail.data.maxAdminCount}`"></dd></div>
                  <div><dt class="text-slate-400 text-xs">회원</dt><dd x-text="`${detail.data.counts?.members ?? 0} / ${detail.data.maxMemberCount}`"></dd></div>
                  <div><dt class="text-slate-400 text-xs">패키지</dt><dd x-text="detail.data.counts?.packages ?? 0"></dd></div>
                  <div><dt class="text-slate-400 text-xs">예약 누적</dt><dd x-text="detail.data.counts?.reservations ?? 0"></dd></div>
                </dl>
                <div>
                  <p class="text-xs text-slate-400 mb-2">관리자 목록</p>
                  <ul class="space-y-1 text-sm">
                    <template x-for="m in detail.data.memberships" :key="m.id">
                      <li class="flex justify-between items-center px-3 py-2 bg-slate-50 rounded cursor-pointer hover:bg-slate-100" @click="openUser(m.user.id)">
                        <span><span class="font-medium" x-text="m.user.name"></span><span class="text-xs text-slate-400 ml-2" x-text="m.user.email"></span></span>
                        <span class="text-xs text-slate-400" x-text="m.role"></span>
                      </li>
                    </template>
                    <li x-show="!(detail.data.memberships || []).length" class="text-slate-400 text-sm">없음</li>
                  </ul>
                </div>
                <div>
                  <p class="text-xs text-slate-400 mb-2 flex justify-between items-center">
                    <span>합류 신청 대기</span>
                    <button @click="loadJoinRequests(detail.data.id)" class="text-xs text-indigo-500 hover:text-indigo-700">새로고침</button>
                  </p>
                  <ul class="space-y-1 text-sm">
                    <template x-for="r in detail.joinRequests" :key="r.id">
                      <li class="flex justify-between items-center px-3 py-2 bg-amber-50 rounded">
                        <span><span class="font-medium" x-text="r.user.name"></span><span class="text-xs text-slate-500 ml-2" x-text="r.user.email"></span></span>
                        <span class="space-x-2">
                          <button @click="reviewJoinRequest(detail.data.id, r.id, 'APPROVE')" class="text-xs px-2 py-0.5 bg-emerald-500 text-white rounded">승인</button>
                          <button @click="reviewJoinRequest(detail.data.id, r.id, 'REJECT')" class="text-xs px-2 py-0.5 bg-rose-500 text-white rounded">거절</button>
                        </span>
                      </li>
                    </template>
                    <li x-show="!detail.joinRequests.length" class="text-slate-400 text-sm">대기 중인 신청 없음</li>
                  </ul>
                </div>
                <div class="pt-4 border-t">
                  <button @click="deleteOrgConfirm(detail.data.id)" class="text-sm text-rose-500 hover:text-rose-700">조직 삭제</button>
                </div>
              </div>
            </template>
          </div>
        </aside>
      </div>

    </div>
  </template>
</div>

<script>
function adminApp() {
  return {
    token: localStorage.getItem('coachdesk_admin_token') || '',
    me: null,
    page: 'dashboard',
    nav: [
      { id: 'dashboard', label: '대시보드' },
      { id: 'users',     label: '사용자' },
      { id: 'members',   label: '회원 계정' },
      { id: 'orgs',      label: '조직' },
    ],
    form: { username: '', password: '' },
    loginError: '',
    loading: false,
    dashboardCards: [],
    signupChart: null,
    reservationChart: null,
    latestUsers: [],
    latestMembers: [],
    latestOrgs: [],

    users: [], usersSearch: '',
    memberAccounts: [], membersSearch: '',
    organizations: [], orgsSearch: '',
    pw: { current: '', next: '', message: '', success: false },

    detail: {
      open: false,
      kind: null,    // 'user' | 'member' | 'org'
      data: null,
      title: '',
      loading: false,
      joinRequests: [],
    },

    async init() {
      if (this.token) {
        await this.loadMe();
        if (this.token) await this.loadDashboard();
      }
      this.$watch('page', (p) => {
        if (p === 'dashboard') this.loadDashboard();
        if (p === 'users') this.loadUsers();
        if (p === 'members') this.loadMembers();
        if (p === 'orgs') this.loadOrgs();
      });
    },

    api(path, options = {}) {
      const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
      if (this.token) headers['Authorization'] = 'Bearer ' + this.token;
      return fetch('/api/admin' + path, { ...options, headers }).then(async (res) => {
        if (res.status === 401 && path !== '/login') {
          this.token = '';
          localStorage.removeItem('coachdesk_admin_token');
          throw new Error('Unauthorized');
        }
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.error || res.statusText);
        }
        return res.json();
      });
    },

    async login() {
      this.loginError = '';
      this.loading = true;
      try {
        const data = await this.api('/login', {
          method: 'POST',
          body: JSON.stringify(this.form),
        });
        this.token = data.token;
        localStorage.setItem('coachdesk_admin_token', this.token);
        this.me = data.admin;
        this.form.password = '';
        await this.loadDashboard();
      } catch (e) {
        this.loginError = e.message || '로그인 실패';
      } finally {
        this.loading = false;
      }
    },

    async loadMe() {
      try {
        const data = await this.api('/me');
        this.me = data.admin;
      } catch (_) { /* token cleared by api() */ }
    },

    logout() {
      this.token = '';
      localStorage.removeItem('coachdesk_admin_token');
      this.me = null;
      this.page = 'dashboard';
    },

    async loadDashboard() {
      try {
        const data = await this.api('/dashboard');
        this.dashboardCards = [
          { label: '전체 사용자',   value: data.userCount ?? '-' },
          { label: '전체 회원',     value: data.memberAccountCount ?? '-' },
          { label: '전체 조직',     value: data.organizationCount ?? '-' },
          { label: '회원 등록',     value: data.memberCount ?? '-' },
          { label: '오늘 가입',     value: data.todaySignupCount ?? '-', sub: `사용자 ${data.todayUserCount ?? 0} · 회원 ${data.todayMemberAccountCount ?? 0}` },
          { label: '오늘 예약',     value: data.todayReservationCount ?? '-' },
          { label: '센터 합류 대기', value: data.pendingJoinRequestCount ?? '-' },
        ];
        this.latestUsers = data.latestUsers || [];
        this.latestMembers = data.latestMemberAccounts || [];
        this.latestOrgs = data.latestOrganizations || [];
        this.$nextTick(() => {
          this.renderChart('signupsChart', 'signupChart', data.signupsLast7Days || [], 'rgb(79,70,229)');
          this.renderChart('reservationsChart', 'reservationChart', data.reservationsLast7Days || [], 'rgb(16,185,129)');
        });
      } catch (e) {
        console.error(e);
      }
    },

    renderChart(canvasId, key, series, color) {
      const el = document.getElementById(canvasId);
      if (!el) return;
      if (this[key]) { this[key].destroy(); this[key] = null; }
      const labels = (series || []).map((p) => (p.date || p.day || '').slice(5));
      const dataset = (series || []).map((p) => p.count ?? p.value ?? 0);
      this[key] = new Chart(el, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            data: dataset,
            borderColor: color,
            backgroundColor: color.replace('rgb', 'rgba').replace(')', ',0.1)'),
            tension: 0.3,
            fill: true,
            pointRadius: 3,
          }],
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } },
        },
      });
    },

    async loadUsers() {
      try {
        const q = this.usersSearch ? '?search=' + encodeURIComponent(this.usersSearch) : '';
        const data = await this.api('/users' + q);
        this.users = data.users || data;
      } catch (e) { console.error(e); }
    },

    async loadMembers() {
      try {
        const q = this.membersSearch ? '?search=' + encodeURIComponent(this.membersSearch) : '';
        const data = await this.api('/member-accounts' + q);
        this.memberAccounts = data.memberAccounts || data;
      } catch (e) { console.error(e); }
    },

    async loadOrgs() {
      try {
        const q = this.orgsSearch ? '?search=' + encodeURIComponent(this.orgsSearch) : '';
        const data = await this.api('/organizations' + q);
        this.organizations = data.organizations || data;
      } catch (e) { console.error(e); }
    },

    closeDetail() {
      this.detail.open = false;
      this.detail.data = null;
      this.detail.kind = null;
      this.detail.joinRequests = [];
    },

    async openUser(id) {
      this.detail = { open: true, kind: 'user', data: null, title: '사용자 상세', loading: true, joinRequests: [] };
      try {
        this.detail.data = await this.api('/users/' + id);
      } catch (e) {
        alert('불러오기 실패: ' + e.message);
        this.closeDetail();
      } finally { this.detail.loading = false; }
    },

    async openMember(id) {
      this.detail = { open: true, kind: 'member', data: null, title: '회원 계정 상세', loading: true, joinRequests: [] };
      try {
        this.detail.data = await this.api('/member-accounts/' + id);
      } catch (e) {
        alert('불러오기 실패: ' + e.message);
        this.closeDetail();
      } finally { this.detail.loading = false; }
    },

    async openOrg(id) {
      this.detail = { open: true, kind: 'org', data: null, title: '조직 상세', loading: true, joinRequests: [] };
      try {
        this.detail.data = await this.api('/organizations/' + id);
        await this.loadJoinRequests(id);
      } catch (e) {
        alert('불러오기 실패: ' + e.message);
        this.closeDetail();
      } finally { this.detail.loading = false; }
    },

    async loadJoinRequests(orgId) {
      try {
        const data = await this.api('/organizations/' + orgId + '/join-requests?status=PENDING');
        this.detail.joinRequests = data.requests || data || [];
      } catch (e) {
        this.detail.joinRequests = [];
      }
    },

    async reviewJoinRequest(orgId, requestId, action) {
      if (!confirm(action === 'APPROVE' ? '승인하시겠습니까?' : '거절하시겠습니까?')) return;
      try {
        await this.api('/organizations/' + orgId + '/join-requests/' + requestId, {
          method: 'PUT',
          body: JSON.stringify({ action }),
        });
        await this.loadJoinRequests(orgId);
        // 조직 상세도 갱신
        this.detail.data = await this.api('/organizations/' + orgId);
      } catch (e) {
        alert('처리 실패: ' + e.message);
      }
    },

    async deleteUserConfirm(id) {
      if (!confirm('정말 이 사용자를 삭제할까요? 이 작업은 되돌릴 수 없습니다.')) return;
      try {
        await this.api('/users/' + id, { method: 'DELETE' });
        this.closeDetail();
        await this.loadUsers();
      } catch (e) {
        alert('삭제 실패: ' + e.message);
      }
    },

    async deleteOrgConfirm(id) {
      if (!confirm('정말 이 조직을 삭제할까요? 모든 데이터가 함께 사라집니다.')) return;
      try {
        await this.api('/organizations/' + id, { method: 'DELETE' });
        this.closeDetail();
        await this.loadOrgs();
      } catch (e) {
        alert('삭제 실패: ' + e.message);
      }
    },

    async changePassword() {
      this.pw.message = '';
      try {
        await this.api('/me/change-password', {
          method: 'POST',
          body: JSON.stringify({ currentPassword: this.pw.current, newPassword: this.pw.next }),
        });
        this.pw.success = true;
        this.pw.message = '비밀번호가 변경되었습니다';
        this.pw.current = '';
        this.pw.next = '';
      } catch (e) {
        this.pw.success = false;
        this.pw.message = e.message || '변경에 실패했습니다';
      }
    },

    formatDate(value) {
      if (!value) return '-';
      const d = new Date(value);
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${d.getFullYear()}.${m}.${day}`;
    },
    formatDateTime(value) {
      if (!value) return '-';
      const d = new Date(value);
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      const h = String(d.getHours()).padStart(2, '0');
      const mn = String(d.getMinutes()).padStart(2, '0');
      return `${d.getFullYear()}.${m}.${day} ${h}:${mn}`;
    },
  };
}
</script>
</body>
</html>
