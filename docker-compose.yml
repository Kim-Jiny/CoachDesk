name: coachdesk

services:
  db:
    image: postgres:16-alpine
    container_name: coachdesk-db
    restart: unless-stopped
    volumes:
      - coachdesk_pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:55440:5432"
    environment:
      POSTGRES_DB: coachdesk
      POSTGRES_USER: coachdesk
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coachdesk -d coachdesk"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app-network

  minio:
    image: minio/minio
    container_name: coach-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    volumes:
      - coachdesk_minio_data:/data
    ports:
      - "127.0.0.1:59000:9000"
      - "127.0.0.1:59002:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app-network

  minio-init:
    image: minio/mc
    container_name: coach-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://coach-minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing myminio/coachdesk;
      mc anonymous set download myminio/coachdesk;
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks:
      - app-network

  coach:
    build: ./server
    container_name: coach-desk
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://coachdesk:${DB_PASSWORD}@coachdesk-db:5432/coachdesk?sslmode=disable
      MINIO_ENDPOINT: http://coach-minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: coachdesk
      STORAGE_PUBLIC_URL: ${STORAGE_PUBLIC_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_ANDROID_CLIENT_ID: ${GOOGLE_ANDROID_CLIENT_ID}
      GOOGLE_IOS_CLIENT_ID: ${GOOGLE_IOS_CLIENT_ID}
      APPLE_AUDIENCES: ${APPLE_AUDIENCES:-com.jiny.coachdesk}
      FIREBASE_SERVICE_ACCOUNT: /app/firebase-service-account.json
      PORT: 3000
      NODE_ENV: production
    volumes:
      - ./server/firebase-service-account.json:/app/firebase-service-account.json:ro
    ports:
      - "127.0.0.1:3010:3000"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    networks:
      - app-network

volumes:
  coachdesk_pgdata:
  coachdesk_minio_data:

networks:
  app-network:
    external: true